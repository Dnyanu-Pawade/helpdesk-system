<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Departments</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span><span class="brand-sub">Admin Portal</span></div>
  <nav class="sidebar-nav">
    <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i> Users</a>
    <a href="all-tickets.html" class="nav-item"><i class="fas fa-ticket-alt"></i> All Tickets</a>
    <a href="admin-departments.html" class="nav-item active"><i class="fas fa-building"></i> Departments</a>
    <a href="audit-logs.html" class="nav-item"><i class="fas fa-history"></i> Audit Logs</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-shield"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Department Management</h5></div>
  <div class="content-body">
    <div class="row g-3">
      <div class="col-md-4">
        <div class="card"><div class="card-header"><h6>Add Department</h6></div>
        <div class="card-body">
          <div id="dept-error" class="alert alert-danger d-none"></div>
          <div class="mb-3"><label class="form-label">Name *</label><input type="text" id="dept-name" class="form-control"/></div>
          <div class="mb-3"><label class="form-label">Description</label><textarea id="dept-desc" class="form-control" rows="2"></textarea></div>
          <button class="btn btn-primary w-100" onclick="addDept()"><i class="fas fa-plus me-1"></i>Add Department</button>
        </div></div>
      </div>
      <div class="col-md-8">
        <div class="card"><div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light"><tr><th>ID</th><th>Name</th><th>Description</th><th>Created</th></tr></thead>
            <tbody id="dept-body"><tr><td colspan="4" class="text-center py-3">Loading...</td></tr></tbody>
          </table>
        </div></div>
      </div>
    </div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
async function loadDepts() {
  const tbody=document.getElementById('dept-body');
  try {
    const depts = await api.getDepartments();
    tbody.innerHTML = depts.map(d=>`<tr><td>${d.id}</td><td><strong>${d.name}</strong></td><td>${d.description||'-'}</td><td>${formatDate(d.createdAt)}</td></tr>`).join('');
  } catch(e){ tbody.innerHTML=`<tr><td colspan="4" class="text-center py-3 text-danger">${e.message}</td></tr>`; }
}
async function addDept() {
  const name=document.getElementById('dept-name').value.trim();
  if(!name){ document.getElementById('dept-error').textContent='Name is required'; document.getElementById('dept-error').classList.remove('d-none'); return; }
  try { await api.createDepartment({name,description:document.getElementById('dept-desc').value}); showToast('Department added!'); document.getElementById('dept-name').value=''; document.getElementById('dept-desc').value=''; loadDepts(); } catch(e){ showToast(e.message,'error'); }
}
document.addEventListener('DOMContentLoaded', loadDepts);
</script></body></html>
