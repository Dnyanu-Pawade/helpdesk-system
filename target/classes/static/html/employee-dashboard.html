<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Employee Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span><span class="brand-sub">Employee Portal</span></div>
  <nav class="sidebar-nav">
    <a href="employee-dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
    <a href="raise-ticket.html" class="nav-item"><i class="fas fa-plus-circle"></i> Raise Ticket</a>
    <a href="my-tickets.html" class="nav-item"><i class="fas fa-ticket-alt"></i> My Tickets</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications <span id="notif-badge" class="badge bg-danger ms-auto d-none">0</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Employee Dashboard</h5><a href="raise-ticket.html" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>Raise Ticket</a></div>
  <div class="content-body">
    <div class="row g-3 mb-4">
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="fas fa-ticket-alt"></i></div><div><div class="stat-value" id="total">-</div><div class="stat-label">Total Tickets</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="fas fa-clock"></i></div><div><div class="stat-value" id="open">-</div><div class="stat-label">Open</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-info bg-opacity-10 text-info"><i class="fas fa-spinner"></i></div><div><div class="stat-value" id="inprogress">-</div><div class="stat-label">In Progress</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-success bg-opacity-10 text-success"><i class="fas fa-check-circle"></i></div><div><div class="stat-value" id="resolved">-</div><div class="stat-label">Resolved</div></div></div></div>
    </div>
    <div class="card">
      <div class="card-header"><h6>Recent Tickets</h6><a href="my-tickets.html" class="btn btn-outline-primary btn-sm">View All</a></div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light"><tr><th>Ticket #</th><th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>Created</th></tr></thead>
          <tbody id="tickets-body"><tr><td colspan="6" class="text-center py-3">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  const tbody = document.getElementById('tickets-body');
  try {
    const data = await api.searchMyTickets({page:0,size:10});
    const tickets = data.content || [];
    const all = await api.searchMyTickets({page:0,size:1000});
    const allT = all.content || [];
    document.getElementById('total').textContent = all.totalElements || 0;
    document.getElementById('open').textContent = allT.filter(t=>t.status==='OPEN'||t.status==='ASSIGNED').length;
    document.getElementById('inprogress').textContent = allT.filter(t=>t.status==='IN_PROGRESS'||t.status==='WAITING_FOR_USER').length;
    document.getElementById('resolved').textContent = allT.filter(t=>t.status==='RESOLVED'||t.status==='CLOSED').length;
    if (!tickets.length) { tbody.innerHTML='<tr><td colspan="6" class="text-center py-3 text-muted">No tickets yet. <a href="raise-ticket.html">Raise one now</a></td></tr>'; return; }
    tbody.innerHTML = tickets.map(t=>`<tr class="${t.slaBreached?'sla-breached':''}"><td><a href="ticket-detail.html?id=${t.id}" class="text-decoration-none fw-semibold">${t.ticketNumber}</a></td><td>${t.title}</td><td><span class="badge bg-secondary" style="font-size:10px">${(t.category||'').replace(/_/g,' ')}</span></td><td>${priorityBadge(t.priority)}</td><td>${statusBadge(t.status)}</td><td>${formatDate(t.createdAt)}</td></tr>`).join('');
  } catch(e) { tbody.innerHTML=`<tr><td colspan="6" class="text-center py-3 text-danger">${e.message}</td></tr>`; }
});
</script></body></html>
