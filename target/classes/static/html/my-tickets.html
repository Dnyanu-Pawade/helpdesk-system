<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>My Tickets</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span><span class="brand-sub">Employee Portal</span></div>
  <nav class="sidebar-nav">
    <a href="employee-dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
    <a href="raise-ticket.html" class="nav-item"><i class="fas fa-plus-circle"></i> Raise Ticket</a>
    <a href="my-tickets.html" class="nav-item active"><i class="fas fa-ticket-alt"></i> My Tickets</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications <span id="notif-badge" class="badge bg-danger ms-auto d-none">0</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">My Tickets</h5><a href="raise-ticket.html" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>Raise Ticket</a></div>
  <div class="content-body">
    <div class="card mb-3"><div class="card-body py-2">
      <div class="row g-2">
        <div class="col-md-5"><input type="text" id="keyword" class="form-control form-control-sm" placeholder="Search tickets..."/></div>
        <div class="col-md-4"><select id="status-filter" class="form-select form-select-sm"><option value="">All Status</option><option>OPEN</option><option>ASSIGNED</option><option>IN_PROGRESS</option><option>WAITING_FOR_USER</option><option>RESOLVED</option><option>CLOSED</option><option>REJECTED</option></select></div>
        <div class="col-md-3"><button class="btn btn-primary btn-sm w-100" onclick="loadTickets(0)"><i class="fas fa-search me-1"></i>Search</button></div>
      </div>
    </div></div>
    <div class="card"><div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Ticket #</th><th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>Assigned To</th><th>Created</th><th>Action</th></tr></thead>
        <tbody id="tickets-body"><tr><td colspan="8" class="text-center py-3">Loading...</td></tr></tbody>
      </table>
    </div>
    <div class="card-footer d-flex justify-content-between align-items-center">
      <small class="text-muted" id="page-info">-</small>
      <div id="pagination" class="d-flex gap-1"></div>
    </div></div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
async function loadTickets(page=0) {
  const tbody=document.getElementById('tickets-body');
  try {
    const data = await api.searchMyTickets({keyword:document.getElementById('keyword').value,status:document.getElementById('status-filter').value,page,size:10});
    if (!data.content.length) { tbody.innerHTML='<tr><td colspan="8" class="text-center py-3 text-muted">No tickets found</td></tr>'; document.getElementById('page-info').textContent='0 results'; document.getElementById('pagination').innerHTML=''; return; }
    tbody.innerHTML = data.content.map(t=>`<tr class="${t.slaBreached?'sla-breached':''}">
      <td><a href="ticket-detail.html?id=${t.id}" class="fw-semibold text-decoration-none">${t.ticketNumber}</a>${t.slaBreached?'<span class="badge bg-danger ms-1" style="font-size:9px">SLA</span>':''}</td>
      <td>${t.title}</td><td><span class="badge bg-secondary" style="font-size:10px">${(t.category||'').replace(/_/g,' ')}</span></td>
      <td>${priorityBadge(t.priority)}</td><td>${statusBadge(t.status)}</td>
      <td>${t.assignedToName||'<span class="text-muted">Unassigned</span>'}</td>
      <td>${formatDate(t.createdAt)}</td>
      <td><a href="ticket-detail.html?id=${t.id}" class="btn btn-outline-primary btn-sm"><i class="fas fa-eye"></i></a></td>
    </tr>`).join('');
    document.getElementById('page-info').textContent=`${data.numberOfElements} of ${data.totalElements}`;
    const pages=document.getElementById('pagination'); pages.innerHTML='';
    for(let i=0;i<data.totalPages;i++){const btn=document.createElement('button');btn.className=`btn btn-sm ${i===page?'btn-primary':'btn-outline-secondary'}`;btn.textContent=i+1;btn.onclick=()=>loadTickets(i);pages.appendChild(btn);}
  } catch(e){ tbody.innerHTML=`<tr><td colspan="8" class="text-center py-3 text-danger">${e.message}</td></tr>`; }
}
document.addEventListener('DOMContentLoaded',()=>loadTickets(0));
</script></body></html>
