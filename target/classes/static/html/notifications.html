<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Notifications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span></div>
  <nav class="sidebar-nav">
    <a href="javascript:history.back()" class="nav-item"><i class="fas fa-arrow-left"></i> Back</a>
    <a href="notifications.html" class="nav-item active"><i class="fas fa-bell"></i> Notifications</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Notifications</h5><button class="btn btn-outline-secondary btn-sm" id="mark-read-btn"><i class="fas fa-check-double me-1"></i>Mark All Read</button></div>
  <div class="content-body">
    <div class="card"><div class="card-body p-0" id="notif-list"><div class="text-center py-4">Loading...</div></div></div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
async function load() {
  const container=document.getElementById('notif-list');
  try {
    const list = await api.getNotifications();
    if (!list||!list.length) { container.innerHTML='<div class="text-center py-4 text-muted"><i class="fas fa-bell-slash fa-2x mb-2 d-block"></i>No notifications</div>'; return; }
    container.innerHTML = list.map(n=>`<div class="d-flex align-items-start p-3 border-bottom ${!n.isRead?'bg-light':''}">
      <div class="me-3 mt-1"><i class="fas fa-bell text-primary"></i></div>
      <div class="flex-grow-1"><div class="fw-semibold" style="font-size:14px">${n.title}</div><div class="text-muted" style="font-size:13px">${n.message}</div><div class="text-muted" style="font-size:11px">${formatDateTime(n.createdAt)}</div></div>
      ${!n.isRead?'<span class="badge bg-primary">New</span>':''}
    </div>`).join('');
  } catch(e){ container.innerHTML=`<div class="text-center py-4 text-danger">${e.message}</div>`; }
}
document.getElementById('mark-read-btn').addEventListener('click', async()=>{ await api.markNotificationsRead(); load(); });
document.addEventListener('DOMContentLoaded', load);
</script></body></html>
