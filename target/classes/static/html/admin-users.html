<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Users</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span><span class="brand-sub">Admin Portal</span></div>
  <nav class="sidebar-nav">
    <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="admin-users.html" class="nav-item active"><i class="fas fa-users"></i> Users</a>
    <a href="all-tickets.html" class="nav-item"><i class="fas fa-ticket-alt"></i> All Tickets</a>
    <a href="admin-departments.html" class="nav-item"><i class="fas fa-building"></i> Departments</a>
    <a href="audit-logs.html" class="nav-item"><i class="fas fa-history"></i> Audit Logs</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-shield"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">User Management</h5></div>
  <div class="content-body">
    <div class="card"><div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Department</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="users-body"><tr><td colspan="7" class="text-center py-3">Loading...</td></tr></tbody>
      </table>
    </div></div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  const tbody=document.getElementById('users-body');
  try {
    const users = await api.getAllUsers();
    tbody.innerHTML = users.map(u=>`<tr>
      <td><strong>${u.fullName}</strong><div style="font-size:11px;color:#64748b">${u.employeeId||''}</div></td>
      <td>${u.username}</td><td>${u.email}</td>
      <td><span class="badge bg-primary" style="font-size:10px">${(u.role||'').replace('ROLE_','').replace('_',' ')}</span></td>
      <td>${u.department?.name||'-'}</td>
      <td><span class="badge ${u.active?'bg-success':'bg-danger'}">${u.active?'Active':'Inactive'}</span></td>
      <td class="d-flex gap-1">
        <select class="form-select form-select-sm" style="width:140px" onchange="updateRole(${u.id},this.value)">
          <option value="">Change Role</option>
          <option value="ROLE_EMPLOYEE">Employee</option>
          <option value="ROLE_SUPPORT_ENGINEER">Engineer</option>
          <option value="ROLE_TEAM_LEAD">Team Lead</option>
          <option value="ROLE_ADMIN">Admin</option>
        </select>
        <button class="btn btn-sm ${u.active?'btn-warning':'btn-success'}" onclick="toggleStatus(${u.id})">${u.active?'Disable':'Enable'}</button>
      </td>
    </tr>`).join('');
  } catch(e){ tbody.innerHTML=`<tr><td colspan="7" class="text-center py-3 text-danger">${e.message}</td></tr>`; }
});
async function updateRole(id, role) { if(!role) return; try { await api.updateUserRole(id, role); showToast('Role updated!'); location.reload(); } catch(e){ showToast(e.message,'error'); } }
async function toggleStatus(id) { try { await api.toggleUserStatus(id); showToast('Status updated!'); location.reload(); } catch(e){ showToast(e.message,'error'); } }
</script></body></html>
