<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Ticket Detail</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span></div>
  <nav class="sidebar-nav">
    <a href="javascript:history.back()" class="nav-item"><i class="fas fa-arrow-left"></i> Back</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications <span id="notif-badge" class="badge bg-danger ms-auto d-none">0</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold" id="ticket-title">Ticket Detail</h5>
    <div class="d-flex gap-2">
      <button class="btn btn-success btn-sm d-none" id="close-btn" onclick="closeTicket()"><i class="fas fa-check me-1"></i>Close Ticket</button>
      <button class="btn btn-warning btn-sm d-none" id="reopen-btn" onclick="reopenTicket()"><i class="fas fa-redo me-1"></i>Reopen</button>
    </div>
  </div>
  <div class="content-body">
    <div id="ticket-info" class="row g-3 mb-4"></div>
    <div class="row g-3">
      <div class="col-lg-8">
        <div class="card mb-3"><div class="card-header"><h6>Comments / Chat</h6></div>
          <div class="card-body" id="comments-list" style="max-height:400px;overflow-y:auto"></div>
          <div class="card-footer">
            <div class="d-flex gap-2">
              <input type="text" id="comment-input" class="form-control form-control-sm" placeholder="Type a message..."/>
              <button class="btn btn-primary btn-sm" onclick="addComment()"><i class="fas fa-paper-plane"></i></button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card mb-3"><div class="card-header"><h6>Attachments</h6></div>
          <div class="card-body" id="attachments-list"></div>
          <div class="card-footer">
            <input type="file" id="attach-file" class="form-control form-control-sm mb-2"/>
            <button class="btn btn-outline-primary btn-sm w-100" onclick="uploadFile()"><i class="fas fa-upload me-1"></i>Upload</button>
          </div>
        </div>
        <div class="card"><div class="card-header"><h6>History</h6></div>
          <div class="card-body p-0" id="history-list" style="max-height:300px;overflow-y:auto"></div>
        </div>
      </div>
    </div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
const ticketId = new URLSearchParams(window.location.search).get('id');
let ticket = null;
async function load() {
  try {
    ticket = await api.getTicketById(ticketId);
    document.getElementById('ticket-title').textContent = ticket.ticketNumber + ' - ' + ticket.title;
    document.getElementById('ticket-info').innerHTML = `
      <div class="col-md-3"><div class="card p-3"><small class="text-muted">Status</small><div>${statusBadge(ticket.status)}</div></div></div>
      <div class="col-md-3"><div class="card p-3"><small class="text-muted">Priority</small><div>${priorityBadge(ticket.priority)}</div></div></div>
      <div class="col-md-3"><div class="card p-3"><small class="text-muted">Category</small><div><span class="badge bg-secondary">${(ticket.category||'').replace(/_/g,' ')}</span></div></div></div>
      <div class="col-md-3"><div class="card p-3"><small class="text-muted">Assigned To</small><div class="fw-semibold" style="font-size:13px">${ticket.assignedTo?.fullName||'Unassigned'}</div></div></div>
      <div class="col-12"><div class="card p-3"><small class="text-muted">Description</small><p class="mb-0 mt-1" style="font-size:13px">${ticket.description||'-'}</p></div></div>
      ${ticket.resolution?`<div class="col-12"><div class="card p-3 border-success"><small class="text-success fw-semibold">Resolution</small><p class="mb-0 mt-1" style="font-size:13px">${ticket.resolution}</p></div></div>`:''}
    `;
    const u = api.getUser();
    if (ticket.createdBy?.id == u?.id) {
      if (['RESOLVED'].includes(ticket.status)) document.getElementById('close-btn').classList.remove('d-none');
      if (['CLOSED','RESOLVED'].includes(ticket.status)) document.getElementById('reopen-btn').classList.remove('d-none');
    }
    await loadComments(); await loadAttachments(); await loadHistory();
  } catch(e) { document.getElementById('ticket-info').innerHTML=`<div class="col-12"><div class="alert alert-danger">${e.message}</div></div>`; }
}
async function loadComments() {
  const list = await api.getComments(ticketId);
  const u = api.getUser();
  document.getElementById('comments-list').innerHTML = list.length ? list.map(c=>`
    <div class="d-flex gap-2 mb-3 ${c.author?.id==u?.id?'flex-row-reverse':''}">
      <div class="user-avatar bg-secondary" style="width:32px;height:32px;font-size:12px;flex-shrink:0"><i class="fas fa-user"></i></div>
      <div class="${c.author?.id==u?.id?'bg-primary text-white':'bg-light'} rounded p-2" style="max-width:80%;font-size:13px">
        <div class="fw-semibold mb-1" style="font-size:11px">${c.author?.fullName||'-'}</div>
        ${c.content}
        <div style="font-size:10px;opacity:.7;margin-top:4px">${formatDateTime(c.createdAt)}</div>
      </div>
    </div>`).join('') : '<p class="text-muted text-center py-3" style="font-size:13px">No comments yet</p>';
  document.getElementById('comments-list').scrollTop = 9999;
}
async function loadAttachments() {
  const list = await api.getAttachments(ticketId);
  document.getElementById('attachments-list').innerHTML = list.length ? list.map(a=>`<div class="d-flex align-items-center gap-2 mb-2"><i class="fas fa-paperclip text-muted"></i><a href="${a.filePath}" target="_blank" style="font-size:12px">${a.fileName}</a></div>`).join('') : '<p class="text-muted" style="font-size:12px">No attachments</p>';
}
async function loadHistory() {
  const list = await api.getHistory(ticketId);
  document.getElementById('history-list').innerHTML = list.map(h=>`<div class="p-2 border-bottom" style="font-size:11px"><span class="badge bg-primary me-1">${h.action}</span><span class="text-muted">${h.changedBy?.fullName||'-'}</span><div class="text-muted">${formatDateTime(h.createdAt)}</div>${h.notes?`<div>${h.notes}</div>`:''}</div>`).join('');
}
async function addComment() {
  const input = document.getElementById('comment-input');
  if (!input.value.trim()) return;
  try { await api.addComment(ticketId, input.value); input.value=''; await loadComments(); } catch(e){ showToast(e.message,'error'); }
}
async function closeTicket() { try { await api.closeTicket(ticketId); showToast('Ticket closed'); setTimeout(()=>window.location.reload(),1000); } catch(e){ showToast(e.message,'error'); } }
async function reopenTicket() { try { await api.reopenTicket(ticketId); showToast('Ticket reopened'); setTimeout(()=>window.location.reload(),1000); } catch(e){ showToast(e.message,'error'); } }
async function uploadFile() {
  const file = document.getElementById('attach-file').files[0]; if (!file) return;
  const fd = new FormData(); fd.append('file', file);
  try { await fetch(`/api/tickets/${ticketId}/attachments`,{method:'POST',headers:{'Authorization':'Bearer '+api.getToken()},body:fd}); showToast('File uploaded'); await loadAttachments(); } catch(e){ showToast(e.message,'error'); }
}
document.getElementById('comment-input').addEventListener('keypress', e=>{ if(e.key==='Enter') addComment(); });
document.addEventListener('DOMContentLoaded', load);
</script></body></html>
