<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body class="login-bg">
<div class="login-wrapper" style="max-width:540px">
  <div class="login-card">
    <div class="text-center mb-4"><div class="login-icon"><i class="fas fa-user-plus"></i></div><h4 class="fw-bold mt-2">Employee Registration</h4></div>
    <div id="reg-error" class="alert alert-danger d-none"></div>
    <div id="reg-success" class="alert alert-success d-none"></div>
    <form id="reg-form">
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Full Name *</label><input type="text" id="fullName" class="form-control" required/></div>
        <div class="col-md-6 mb-3"><label class="form-label">Username *</label><input type="text" id="username" class="form-control" required/></div>
      </div>
      <div class="mb-3"><label class="form-label">Email *</label><input type="email" id="email" class="form-control" required/></div>
      <div class="mb-3"><label class="form-label">Password *</label><input type="password" id="password" class="form-control" minlength="6" required/></div>
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Phone</label><input type="text" id="phone" class="form-control"/></div>
        <div class="col-md-6 mb-3"><label class="form-label">Employee ID</label><input type="text" id="employeeId" class="form-control"/></div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Designation</label><input type="text" id="designation" class="form-control"/></div>
        <div class="col-md-6 mb-3"><label class="form-label">Department</label>
          <select id="departmentId" class="form-select"><option value="">Select...</option></select>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>
    <p class="text-center mt-3" style="font-size:13px"><a href="/index.html"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></p>
  </div>
</div>
<script>
async function loadDepts() {
  try {
    const res = await fetch('/api/admin/departments', {headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
    if (!res.ok) return;
    const depts = await res.json();
    const sel = document.getElementById('departmentId');
    depts.forEach(d => sel.innerHTML += `<option value="${d.id}">${d.name}</option>`);
  } catch(e){}
}
loadDepts();
document.getElementById('reg-form').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const errEl=document.getElementById('reg-error'); const sucEl=document.getElementById('reg-success');
  errEl.classList.add('d-none'); sucEl.classList.add('d-none');
  try {
    const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      fullName:document.getElementById('fullName').value, username:document.getElementById('username').value,
      email:document.getElementById('email').value, password:document.getElementById('password').value,
      phone:document.getElementById('phone').value, employeeId:document.getElementById('employeeId').value,
      designation:document.getElementById('designation').value, departmentId:document.getElementById('departmentId').value||null
    })});
    const data=await res.json();
    if(data.success){ sucEl.textContent='Registered! Redirecting to login...'; sucEl.classList.remove('d-none'); setTimeout(()=>window.location.href='/index.html',2000); }
    else { errEl.textContent=data.message; errEl.classList.remove('d-none'); }
  } catch(err){ errEl.textContent=err.message; errEl.classList.remove('d-none'); }
});
</script></body></html>
