<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Forgot Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body class="login-bg">
<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4"><div class="login-icon"><i class="fas fa-lock"></i></div><h4 class="fw-bold mt-2">Forgot Password</h4></div>
    <div id="step1">
      <div id="fp-error" class="alert alert-danger d-none"></div>
      <div id="fp-success" class="alert alert-success d-none"></div>
      <form id="forgot-form">
        <div class="mb-3"><label class="form-label">Email Address</label><input type="email" id="email" class="form-control" required/></div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Token</button>
      </form>
    </div>
    <div id="step2" class="d-none">
      <div id="rp-error" class="alert alert-danger d-none"></div>
      <div id="rp-success" class="alert alert-success d-none"></div>
      <form id="reset-form">
        <div class="mb-3"><label class="form-label">Reset Token</label><input type="text" id="token" class="form-control" required/></div>
        <div class="mb-3"><label class="form-label">New Password</label><input type="password" id="newPassword" class="form-control" minlength="6" required/></div>
        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
      </form>
    </div>
    <p class="text-center mt-3"><a href="/index.html"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></p>
  </div>
</div>
<script>
document.getElementById('forgot-form').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const errEl=document.getElementById('fp-error'); const sucEl=document.getElementById('fp-success');
  errEl.classList.add('d-none'); sucEl.classList.add('d-none');
  try {
    const res=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value})});
    const data=await res.json();
    if(data.success){
      const token = data.message && data.message.startsWith('RESET_TOKEN:') ? data.message.replace('RESET_TOKEN:','') : null;
      if(token){ sucEl.innerHTML='<strong>Reset Token:</strong><br><code style="word-break:break-all;font-size:11px">'+token+'</code>'; document.getElementById('token').value=token; }
      else { sucEl.textContent='Reset token sent to your email!'; }
      sucEl.classList.remove('d-none');
      setTimeout(()=>{document.getElementById('step1').classList.add('d-none');document.getElementById('step2').classList.remove('d-none');},2000);
    } else { errEl.textContent=data.message; errEl.classList.remove('d-none'); }
  } catch(err){ errEl.textContent=err.message; errEl.classList.remove('d-none'); }
});
document.getElementById('reset-form').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const errEl=document.getElementById('rp-error'); const sucEl=document.getElementById('rp-success');
  try {
    const res=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:document.getElementById('token').value,newPassword:document.getElementById('newPassword').value})});
    const data=await res.json();
    if(data.success){ sucEl.textContent='Password reset! Redirecting...'; sucEl.classList.remove('d-none'); setTimeout(()=>window.location.href='/index.html',2000); }
    else { errEl.textContent=data.message; errEl.classList.remove('d-none'); }
  } catch(err){ errEl.textContent=err.message; errEl.classList.remove('d-none'); }
});
</script></body></html>
