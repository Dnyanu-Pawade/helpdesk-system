<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Team Lead Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span><span class="brand-sub">Team Lead Portal</span></div>
  <nav class="sidebar-nav">
    <a href="teamlead-dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
    <a href="all-tickets.html" class="nav-item"><i class="fas fa-list"></i> All Tickets</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications <span id="notif-badge" class="badge bg-danger ms-auto d-none">0</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-tie"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Team Lead Dashboard — Assign Tickets</h5></div>
  <div class="content-body">
    <div class="card">
      <div class="card-header"><h6>Open Tickets — Pending Assignment</h6></div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light"><tr><th>Ticket #</th><th>Title</th><th>Category</th><th>Priority</th><th>Raised By</th><th>Created</th><th>Actions</th></tr></thead>
          <tbody id="tickets-body"><tr><td colspan="7" class="text-center py-3">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>
</div>
<div class="modal fade" id="assignModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Assign Ticket</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <p id="assign-ticket-title" class="fw-semibold mb-3"></p>
      <label class="form-label">Select Engineer *</label>
      <select id="engineer-select" class="form-select"></select>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" id="confirm-assign-btn">Assign</button><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button></div>
  </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
let selectedId=null;
const modal = new bootstrap.Modal(document.getElementById('assignModal'));
async function loadTickets() {
  const tbody=document.getElementById('tickets-body');
  try {
    const tickets = await api.getOpenTickets();
    if (!tickets.length) { tbody.innerHTML='<tr><td colspan="7" class="text-center py-4 text-muted"><i class="fas fa-check-circle fa-2x mb-2 text-success d-block"></i>No open tickets</td></tr>'; return; }
    tbody.innerHTML = tickets.map(t=>`<tr>
      <td><a href="ticket-detail.html?id=${t.id}" class="fw-semibold text-decoration-none">${t.ticketNumber}</a></td>
      <td>${t.title}</td><td><span class="badge bg-secondary" style="font-size:10px">${(t.category||'').replace(/_/g,' ')}</span></td>
      <td>${priorityBadge(t.priority)}</td><td>${t.createdByName||'-'}</td><td>${formatDate(t.createdAt)}</td>
      <td><button class="btn btn-primary btn-sm" onclick="openAssign(${t.id},'${t.title}')"><i class="fas fa-user-plus me-1"></i>Assign</button></td>
    </tr>`).join('');
  } catch(e){ tbody.innerHTML=`<tr><td colspan="7" class="text-center py-3 text-danger">${e.message}</td></tr>`; }
}
async function openAssign(id, title) {
  selectedId=id;
  document.getElementById('assign-ticket-title').textContent='Ticket: '+title;
  const engineers = await api.getEngineers();
  document.getElementById('engineer-select').innerHTML = engineers.map(e=>`<option value="${e.id}">${e.fullName} (${e.designation||'Engineer'})</option>`).join('');
  modal.show();
}
document.getElementById('confirm-assign-btn').addEventListener('click', async()=>{
  const engineerId = parseInt(document.getElementById('engineer-select').value);
  try { await api.assignTicket(selectedId, engineerId); modal.hide(); showToast('Ticket assigned!'); loadTickets(); } catch(e){ showToast(e.message,'error'); }
});
document.addEventListener('DOMContentLoaded', loadTickets);
</script></body></html>
