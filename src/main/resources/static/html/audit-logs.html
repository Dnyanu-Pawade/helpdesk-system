<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Audit Logs</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span><span class="brand-sub">Admin Portal</span></div>
  <nav class="sidebar-nav">
    <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i> Users</a>
    <a href="all-tickets.html" class="nav-item"><i class="fas fa-ticket-alt"></i> All Tickets</a>
    <a href="admin-departments.html" class="nav-item"><i class="fas fa-building"></i> Departments</a>
    <a href="audit-logs.html" class="nav-item active"><i class="fas fa-history"></i> Audit Logs</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-shield"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Audit Logs</h5></div>
  <div class="content-body">
    <div class="card"><div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>User</th><th>Action</th><th>Entity</th><th>Details</th><th>Time</th></tr></thead>
        <tbody id="logs-body"><tr><td colspan="5" class="text-center py-3">Loading...</td></tr></tbody>
      </table>
    </div></div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  const tbody=document.getElementById('logs-body');
  try {
    const logs = await api.getAuditLogs(200);
    if (!logs||!logs.length) { tbody.innerHTML='<tr><td colspan="5" class="text-center py-3 text-muted">No logs</td></tr>'; return; }
    tbody.innerHTML = logs.map(l=>`<tr><td><strong>${l.performedBy||'-'}</strong></td><td><span class="badge bg-primary" style="font-size:10px">${l.action||'-'}</span></td><td><small class="text-muted">${l.entity||'-'} ${l.entityId?'('+l.entityId+')':''}</small></td><td><small>${l.details||'-'}</small></td><td><small class="text-muted">${formatDateTime(l.createdAt)}</small></td></tr>`).join('');
  } catch(e){ tbody.innerHTML=`<tr><td colspan="5" class="text-center py-3 text-danger">${e.message}</td></tr>`; }
});
</script></body></html>
