<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-headset me-2"></i>Help Desk</span><span class="brand-sub">Admin Portal</span></div>
  <nav class="sidebar-nav">
    <a href="admin-dashboard.html" class="nav-item active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i> Users</a>
    <a href="all-tickets.html" class="nav-item"><i class="fas fa-ticket-alt"></i> All Tickets</a>
    <a href="admin-departments.html" class="nav-item"><i class="fas fa-building"></i> Departments</a>
    <a href="audit-logs.html" class="nav-item"><i class="fas fa-history"></i> Audit Logs</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications <span id="notif-badge" class="badge bg-danger ms-auto d-none">0</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-shield"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Admin Dashboard</h5></div>
  <div class="content-body">
    <div class="row g-3 mb-4">
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="fas fa-ticket-alt"></i></div><div><div class="stat-value" id="totalTickets">-</div><div class="stat-label">Total Tickets</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="fas fa-folder-open"></i></div><div><div class="stat-value" id="openTickets">-</div><div class="stat-label">Open</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-success bg-opacity-10 text-success"><i class="fas fa-check-circle"></i></div><div><div class="stat-value" id="resolvedTickets">-</div><div class="stat-label">Resolved</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-danger bg-opacity-10 text-danger"><i class="fas fa-exclamation-triangle"></i></div><div><div class="stat-value" id="criticalTickets">-</div><div class="stat-label">Critical</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-info bg-opacity-10 text-info"><i class="fas fa-spinner"></i></div><div><div class="stat-value" id="inProgressTickets">-</div><div class="stat-label">In Progress</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-dark bg-opacity-10 text-dark"><i class="fas fa-lock"></i></div><div><div class="stat-value" id="closedTickets">-</div><div class="stat-label">Closed</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-danger bg-opacity-10 text-danger"><i class="fas fa-clock"></i></div><div><div class="stat-value" id="slaBreached">-</div><div class="stat-label">SLA Breached</div></div></div></div>
      <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-purple bg-opacity-10" style="color:#8b5cf6"><i class="fas fa-users"></i></div><div><div class="stat-value" id="totalUsers">-</div><div class="stat-label">Total Users</div></div></div></div>
    </div>
    <div class="row g-3 mb-4">
      <div class="col-md-6"><div class="card p-3"><h6 class="mb-3">Tickets by Category</h6><canvas id="categoryChart" height="200"></canvas></div></div>
      <div class="col-md-6"><div class="card p-3"><h6 class="mb-3">Tickets by Priority</h6><canvas id="priorityChart" height="200"></canvas></div></div>
    </div>
    <div class="row g-3">
      <div class="col-md-8"><div class="card p-3"><h6 class="mb-3">Monthly Tickets</h6><canvas id="monthlyChart" height="150"></canvas></div></div>
      <div class="col-md-4"><div class="card p-3"><h6 class="mb-3">Engineer Performance</h6><div id="engineer-perf"></div></div></div>
    </div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  try {
    const stats = await api.getDashboard();
    document.getElementById('totalTickets').textContent = stats.totalTickets||0;
    document.getElementById('openTickets').textContent = stats.openTickets||0;
    document.getElementById('resolvedTickets').textContent = stats.resolvedTickets||0;
    document.getElementById('criticalTickets').textContent = stats.criticalTickets||0;
    document.getElementById('inProgressTickets').textContent = stats.inProgressTickets||0;
    document.getElementById('closedTickets').textContent = stats.closedTickets||0;
    document.getElementById('slaBreached').textContent = stats.slaBreached||0;
    document.getElementById('totalUsers').textContent = stats.totalUsers||0;
  } catch(e){}
  try {
    const cat = await api.getCategoryChart();
    new Chart(document.getElementById('categoryChart'), {type:'bar',data:{labels:cat.labels,datasets:[{label:'Tickets',data:cat.values,backgroundColor:'#4f46e5'}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  } catch(e){}
  try {
    const pri = await api.getPriorityChart();
    new Chart(document.getElementById('priorityChart'), {type:'doughnut',data:{labels:pri.labels,datasets:[{data:pri.values,backgroundColor:['#22c55e','#eab308','#ef4444','#1e293b']}]},options:{plugins:{legend:{position:'bottom'}}}});
  } catch(e){}
  try {
    const mon = await api.getMonthlyChart();
    new Chart(document.getElementById('monthlyChart'), {type:'line',data:{labels:mon.labels,datasets:[{label:'Tickets',data:mon.values,borderColor:'#4f46e5',backgroundColor:'rgba(79,70,229,.1)',fill:true,tension:.4}]},options:{scales:{y:{beginAtZero:true}}}});
  } catch(e){}
  try {
    const perf = await api.getEngineerPerformance();
    document.getElementById('engineer-perf').innerHTML = perf.length ? perf.map(e=>`<div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-light rounded"><div><div class="fw-semibold" style="font-size:13px">${e.name}</div><small class="text-muted">Total: ${e.total}</small></div><span class="badge bg-success">${e.resolved} resolved</span></div>`).join('') : '<p class="text-muted" style="font-size:13px">No data</p>';
  } catch(e){}
});
</script></body></html>
