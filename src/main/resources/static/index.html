<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Help Desk & IT Ticketing System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="login-bg">
<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-icon"><i class="fas fa-headset"></i></div>
      <h4 class="fw-bold mt-3">Help Desk System</h4>
      <p class="text-muted" style="font-size:13px">Enterprise IT Ticketing Platform v1.0</p>
    </div>
    <div id="login-error" class="alert alert-danger d-none"></div>
    <form id="login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="login-btn">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>
    <div class="d-flex justify-content-between mt-3" style="font-size:13px">
      <a href="html/register.html">New Employee? Register</a>
      <a href="forgot-password.html">Forgot Password?</a>
    </div>
    <hr/>
    <div style="font-size:12px">
      <p class="fw-semibold mb-2"><i class="fas fa-users me-1"></i>Default Accounts</p>
      <table class="table table-sm table-bordered mb-0">
        <thead class="table-light"><tr><th>Role</th><th>Username</th><th>Password</th></tr></thead>
        <tbody>
          <tr><td><span class="badge bg-danger">Admin</span></td><td>admin</td><td>Admin@123</td></tr>
          <tr><td><span class="badge bg-warning text-dark">Team Lead</span></td><td>teamlead1</td><td>TeamLead@123</td></tr>
          <tr><td><span class="badge bg-info text-dark">Engineer</span></td><td>engineer1</td><td>Engineer@123</td></tr>
          <tr><td><span class="badge bg-success">Employee</span></td><td>employee1</td><td>Employee@123</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
